<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="styles.css" />
		<title>Gallery Carousel</title>
	</head>
	<body>
		<main>
			<section class="gallery">
				<h1>World is Nature</h1>
				<div class="gallery-carousel" id="gallery-carousel">
					<button
						class="carousel-btn carousel-btn-active"
						title="forest"
						style="background-image: url(assets/forest.jpg)"
					>
						<div class="carousel-btn-description">
							<h3>Steve Green'hitch</h3>
							<p>October 26 2016</p>
						</div>
						<h2>Mountain Lake</h2>
					</button>
					<button
						class="carousel-btn"
						title="ocean"
						style="background-image: url(assets/ocean.jpg)"
					></button>
					<button
						class="carousel-btn"
						title="waterfall"
						style="background-image: url(assets/waterfall.jpg)"
					></button>
					<button
						class="carousel-btn"
						title="hiking"
						style="background-image: url(assets/hiking.jpg)"
					></button>
					<button
						class="carousel-btn"
						title="sea"
						style="background-image: url(assets/sea.jpg)"
					></button>
				</div>
			</section>
		</main>
		<script src="app.js"></script>
	</body>
</html>
